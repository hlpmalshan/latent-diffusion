model:
  base_learning_rate: 4.5e-6
  target: ldm.models.autoencoder.AutoencoderKL
  params:
    monitor: "val/rec_loss"
    embed_dim: 3
    lossconfig:
      target: ldm.modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 10000
        kl_weight: 0.00001
        disc_weight: 0.5

    ddconfig:
      double_z: True
      z_channels: 3
      resolution: 64
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult: [1, 2, 4, 8]  # num_down = len(ch_mult)-1
      num_res_blocks: 2
      attn_resolutions: [ ]
      dropout: 0.1


data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 64
    wrap: True
    train:
      target: ldm.data.celeba.CELEBATrain
      params:
        size: 64
        # degradation: pil_nearest
    validation:
      target: ldm.data.celeba.CELEBAValidation
      params:
        size: 64
        # degradation: pil_nearest

lightning:
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 1000
        max_images: 8
        increase_log_steps: True
  scheduler:
  target: torch.optim.lr_scheduler.ReduceOnPlateau
  params:
    monitor: val/rec_loss
    factor:: 0.5
    patience: 10
    min_lr: 1e-7

  trainer:
    benchmark: True
    accumulate_grad_batches: 1
